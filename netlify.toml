# Tell Netlify to build and publish from the deploy-site/ subdirectory.
# Without this file at the repo root, Netlify defaults to the repo root
# and misses sitemap.xml, og-image.png, functions, examples/, etc.
[build]
  command   = "npm install && node build.js"
  publish   = "deploy-site"
  functions = "deploy-site/netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate"]
  timeout = 26

# Pretty URLs for shareable resumes: /r/jane-smith → r.html?u=jane-smith
[[redirects]]
  from = "/r/:username"
  to   = "/r.html?u=:username"
  status = 200
  force  = true
