# Tell Netlify to build and publish from the deploy-site/ subdirectory.
# Without this file at the repo root, Netlify defaults to the repo root
# and misses sitemap.xml, og-image.png, functions, examples/, etc.
[build]
  command   = "npm install && node build.js"
  publish   = "deploy-site"
  functions = "deploy-site/netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate"]
  timeout = 26

# ---- Portfolio backend ----
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/portfolio-chat"
  to = "/.netlify/functions/portfolio-chat"
  status = 200

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/publish"
  to = "/.netlify/functions/publish"
  status = 200

[[redirects]]
  from = "/api/check-slug"
  to = "/.netlify/functions/check-slug"
  status = 200

[[redirects]]
  from = "/api/portfolio"
  to = "/.netlify/functions/portfolio"
  status = 200

# ---- Public-facing portfolio routes ----
[[redirects]]
  from = "/s/*"
  to = "/.netlify/functions/site"
  status = 200

[[redirects]]
  from = "/i/*"
  to = "/.netlify/functions/image"
  status = 200
