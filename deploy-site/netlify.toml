# v2
# Netlify builds with this directory (deploy-site) as the base, and publishes it.
# The canonical app lives in the repo-root index.html. To guarantee the two
# never drift again, the build step copies the root index.html into this
# publish directory at deploy time. `|| true` keeps the deploy succeeding even
# if the copy is ever a no-op, in which case the committed copy below is served.
[build]
  command   = "cp ../index.html index.html || true"
  publish   = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate"]
  timeout = 26

# Never cache the HTML — always serve the latest version to all users
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# ---- Portfolio backend (ported from resume-ai) ----
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/portfolio-chat"
  to = "/.netlify/functions/portfolio-chat"
  status = 200

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/publish"
  to = "/.netlify/functions/publish"
  status = 200

[[redirects]]
  from = "/api/check-slug"
  to = "/.netlify/functions/check-slug"
  status = 200

[[redirects]]
  from = "/api/portfolio"
  to = "/.netlify/functions/portfolio"
  status = 200

# ---- Public-facing portfolio routes ----
[[redirects]]
  from = "/s/*"
  to = "/.netlify/functions/site"
  status = 200

[[redirects]]
  from = "/i/*"
  to = "/.netlify/functions/image"
  status = 200
