# v2
# Netlify builds with this directory (deploy-site) as the base, and publishes it.
# The canonical app lives in the repo-root index.html. To guarantee the two
# never drift again, the build step copies the root index.html into this
# publish directory at deploy time. `|| true` keeps the deploy succeeding even
# if the copy is ever a no-op, in which case the committed copy below is served.
[build]
  command   = "npm install && cp ../index.html index.html || true"
  publish   = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

[functions."generate"]
  timeout = 26

[functions."share-portfolio"]
  timeout = 15

[[redirects]]
  from = "/p/:slug"
  to = "/.netlify/functions/share-portfolio?id=:slug"
  status = 200
  force = true

[[redirects]]
  from = "/__/auth/*"
  to = "https://resume-ai-2eda1.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

# Never cache the HTML — always serve the latest version to all users
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
