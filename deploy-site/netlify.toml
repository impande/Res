[[redirects]]
  from = "/__/firebase/*"
  to = "https://resume-ai-2eda1.firebaseapp.com/__/firebase/:splat"
  status = 200
  force = true

# Never cache the HTML — always serve the latest version to all users
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
